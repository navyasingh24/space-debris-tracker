<!DOCTYPE html>
<html lang="en">

<div id="hud"></div>
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Space Debris Tracker</title>

  <link
    rel="stylesheet"
    href="./style.css"
  />

</head>

<div id="dashboard">

    <h1>
      SPACE DEBRIS TRACKING SYSTEM
    </h1>
  
    <div class="stat">
      Active Satellites:
      <span id="satCount"></span>
    </div>
  
    <div class="stat">
      Space Debris:
      <span id="debrisCount"></span>
    </div>
  
    <div class="stat">
      Danger Alerts:
      <span id="dangerCount">
        0
      </span>
    </div>
  
    <div class="stat">
      Tracking:
      <span id="trackingName">
        NONE
      </span>
    </div>
  
    <div class="stat">
      UTC Time:
      <span id="utcTime"></span>
    </div>
  
  </div>

  <div id="satellitePanel">

    <h2>
      SATELLITE DATA
    </h2>
  
    <div id="satelliteInfo">
  
      No Satellite Selected
  
    </div>
  
  </div>

<body>

    <div id="alertPanel"></div>

    <div id="satelliteLabel"></div>
  
    <script
      type="module"
      src="./src/main.js"
    ></script>
  
  </body>
